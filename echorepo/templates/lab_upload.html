{% extends "base.html" %}
{% block content %}
<h3>{{ _('Upload lab data') }}</h3>

<p class="text-muted">
  {{ _('Upload either metals results (CSV/XLSX) or biodiversity OTU table (XLSX with sheet') }}
  <code>clean_phylum</code>.
  {{ _('The server will detect the format automatically.') }}
</p>

<form method="post" enctype="multipart/form-data" action="{{ url_for('web.lab_import_auto') }}">
  <input type="file" name="file" required class="form-control mb-2">
  <button class="btn btn-primary">{{ _('Upload') }}</button>
</form>
{% endblock %}
