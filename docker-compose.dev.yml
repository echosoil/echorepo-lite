services:
  echorepo-lite:
    environment:
      APP_ENV: dev
      FLASK_DEBUG: "1"

      # Public canonical map API
      CANONICAL_PUBLIC: "1"

      # Migration-script variables
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: echorepo
      POSTGRES_USER: echorepo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-echorepo-pass}

      # Application database variables
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: echorepo
      DB_USER: echorepo
      DB_PASSWORD: ${POSTGRES_PASSWORD:-echorepo-pass}

      DB_HOST_INSIDE: postgres
      DB_PORT_INSIDE: "5432"

    ports:
      # Prefer localhost unless this port must be reachable directly
      # from other computers.
      - "0.0.0.0:18080:8000"
      - "127.0.0.1:5678:5678"

    command:
      - sh
      - -c
      - |
        python scripts/wait_for_postgres.py &&
        python scripts/run_pg_migrations.py &&
        exec gunicorn \
          --workers 1 \
          --worker-class gthread \
          --threads 4 \
          --bind 0.0.0.0:8000 \
          --timeout 120 \
          --graceful-timeout 30 \
          --keep-alive 5 \
          --reload \
          --access-logfile - \
          --error-logfile - \
          --log-level debug \
          echorepo.wsgi:app

  postgres:
    ports:
      - "5433:5432"
